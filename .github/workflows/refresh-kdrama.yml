name: Refresh K-Drama Charts

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout cinephantom (scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run FUNdex K-drama scraper
        run: python scripts/scrape_fundex_kdramas.py > /tmp/kdrama_charts.json

      - name: Validate scraper output
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/kdrama_charts.json')); print(d.get('count', 0))")
          echo "Scraper returned $COUNT results"
          if [ "$COUNT" = "0" ]; then
            echo "ERROR: Scraper returned 0 results — FUNdex may be rate-limiting. Aborting push to protect existing data."
            exit 1
          fi

      - name: Push to agent-presentation
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          git clone https://x-access-token:${PAGES_TOKEN}@github.com/cvuong233/agent-presentation.git /tmp/pages
          cp /tmp/kdrama_charts.json /tmp/pages/kdrama_charts.json
          cd /tmp/pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kdrama_charts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh FUNdex K-drama charts"
            git push
          fi
