name: Refresh K-Drama Charts

on:
  schedule:
    # Every 6 hours: 01:11, 07:11, 13:11, 19:11 UTC
    # Staggered from IMDb workflow by 11 min to avoid concurrent runs
    - cron: "11 1,7,13,19 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          playwright install chromium --with-deps

      - name: Run FUNdex K-drama scraper
        run: python scripts/scrape_mdl_kdramas.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kdrama_charts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh FUNdex K-drama charts"
            git push
          fi
