name: Refresh IMDb Charts

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout cinephantom (scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run IMDb scraper (TMDB-based, no browser needed)
        run: python scripts/scrape_imdb_charts.py > /tmp/imdb_charts.json

      - name: Push to agent-presentation
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          git clone https://x-access-token:${PAGES_TOKEN}@github.com/cvuong233/agent-presentation.git /tmp/pages
          cp /tmp/imdb_charts.json /tmp/pages/imdb_charts.json
          cd /tmp/pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imdb_charts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Update IMDb charts ${DATE}"
            git push
          fi
