name: Refresh IMDb Charts

on:
  schedule:
    # Weekly on Tuesday at 09:00 UTC (IMDb popularity meter updates weekly by end of Monday US time ~Tue 07:00 UTC)
    - cron: "0 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout cinephantom (scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright && python -m playwright install chromium --with-deps

      - name: Clone agent-presentation
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: git clone https://x-access-token:${PAGES_TOKEN}@github.com/cvuong233/agent-presentation.git /tmp/agent-presentation

      - name: Run IMDb charts fetcher (scraped from IMDb Popularity Meter, TMDB metadata)
        env:
          OUTPUT_PATH: /tmp/agent-presentation/imdb_charts.json
        run: python scripts/fetch_imdb_charts.py

      - name: Validate scraper output
        run: |
          MOVIES=$(python3 -c "import json; d=json.load(open('/tmp/agent-presentation/imdb_charts.json')); print(len(d.get('movies', [])))")
          echo "Scraper returned $MOVIES movies"
          if [ "$MOVIES" = "0" ]; then
            echo "ERROR: Scraper returned 0 movies — aborting push to protect existing data."
            exit 1
          fi

      - name: Push to agent-presentation
        run: |
          cd /tmp/agent-presentation
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imdb_charts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Update IMDb charts ${DATE}"
            git push
          fi
